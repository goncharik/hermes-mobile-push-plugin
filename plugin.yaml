name: hermes-push
version: 0.1.0
description: "Push notifications for the Hermes Mobile iOS app. Registers trigger hooks (approvals, turn-complete, errors, clarify) and a REST route the app uses to register its APNs device token; forwards generic notifications (no message content) to the publisher's stateless push gateway."
author: "Hermes Mobile"
kind: standalone
hooks:
  - pre_approval_request
  - pre_tool_call
  - pre_llm_call
  - post_llm_call
  - on_session_end
