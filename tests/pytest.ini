[pytest]
# This ini lives under tests/ on purpose: it pins pytest's rootdir to this
# directory so pytest never walks up into the repo root, which IS the
# ``hermes_push`` package (flat directory-plugin layout) and whose ``__init__.py``
# cannot be imported standalone (it uses relative imports). conftest.py here
# registers ``hermes_push`` the way the agent's directory loader does.
#
# Run from the repo root with: ``pytest tests/``  (or ``make test``).
testpaths = .
